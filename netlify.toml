# Netlify Configuration - Optimisé pour les performances

[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

# Redirect routes pour SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers - Images (long cache pour assets statiques)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

# Cache headers - Images publiques
[[headers]]
  for = "/*.{png,jpg,jpeg,webp,gif,svg}"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    X-Content-Type-Options = "nosniff"

# Cache headers - Fichiers JS/CSS
[[headers]]
  for = "/*.{js,css}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers de sécurité et performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    
    # Performance headers
    Link = "</assets/*>; rel=preload"

# Compression
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# Netlify Image Optimization (Beta)
[[redirects]]
  from = "/.netlify/images"
  to = "/.netlify/images"
  status = 200
